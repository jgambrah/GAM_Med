<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock PACS Viewer</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #1a1a1a; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .viewer { border: 2px solid #555; background-color: #000; padding: 1rem; text-align: center; }
        h1 { color: #fff; border-bottom: 1px solid #555; padding-bottom: 0.5rem; }
        p { color: #aaa; }
    </style>
</head>
<body>
    <div class="viewer">
        <h1>Mock PACS Image Viewer</h1>
        <svg width="400" height="400" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" fill="#111"/>
            <path d="M20 50 L80 50 M50 20 L50 80" stroke="#444" stroke-width="1"/>
            <text x="50" y="50" fill="#666" font-size="10" text-anchor="middle" dominant-baseline="middle">Simulated Scan Image</text>
        </svg>
        <p>This is a placeholder for a real medical imaging viewer (PACS).</p>
    </div>
</body>
</html>
